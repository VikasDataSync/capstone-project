name: CI Pipeline

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run pipeline
        id: pipeline
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID || vars.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY || vars.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
        run: |
          aws sts get-caller-identity
          aws s3api head-object --bucket capstone-project-vds --key data.csv

          if [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "AWS credentials available. Running full pipeline."
            dvc repro
          else
            echo "AWS credentials missing. Reproducing only non-ingestion stages."
            dvc repro --single-item model_building model_evaluation model_registration
          fi

          MLFLOW_LOGGED=$(
            python -c "import json, pathlib; p = pathlib.Path('reports/experiment_info.json'); print(str(json.loads(p.read_text()).get('mlflow_logged', False)).lower() if p.exists() else 'false')"
          )
          echo "mlflow_logged=$MLFLOW_LOGGED" >> "$GITHUB_OUTPUT"
          echo "mlflow_logged=$MLFLOW_LOGGED"

      - name: Run model tests
        if: ${{ success() && steps.pipeline.outputs.mlflow_logged == 'true' }}
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: |
          python -m unittest tests/test_model.py

      - name: Promote model to production
        if: ${{ success() && steps.pipeline.outputs.mlflow_logged == 'true' }}
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python scripts/promote_model.py

      - name: Run Flask app tests
        if: ${{ success() && steps.pipeline.outputs.mlflow_logged == 'true' }}
        env:
          CAPSTONE_TEST: ${{ secrets.CAPSTONE_TEST }}
        run: python -m unittest tests/test_flask_app.py

      - name: Login to AWS ECR
        if: success()
        run: |
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set region ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
            aws ecr get-login-password --region ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }} | docker login --username AWS --password-stdin ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com

      - name: Ensure ECR repository exists
        env:
          AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}
        run: |
            aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1 || \
            aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Build Docker image
        run: |
            ls -la "$GITHUB_WORKSPACE"
            docker build -t ${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}:latest -f "$GITHUB_WORKSPACE/Dockerfile" "$GITHUB_WORKSPACE"

      - name: Tag Docker image
        run: |
            docker tag ${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}:latest \
            ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com/${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}:latest

    
      - name: Check Docker Authentication
        run: docker info

      - name: Push Docker image to ECR
        run: |
          docker push ${{ vars.AWS_ACCOUNT_ID || secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com/${{ vars.ECR_REPOSITORY || secrets.ECR_REPOSITORY }}:latest

      - name: Set Up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name flask-app-cluster

      - name: Create Kubernetes Secret
        run: |
          kubectl create secret generic capstone-secret \
            --from-literal=CAPSTONE_TEST=${{ secrets.CAPSTONE_TEST }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to EKS
        run: |
          kubectl apply -f deployment.yaml
